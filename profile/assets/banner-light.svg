  <line x1="382" y1="232" x2="490" y2="232" stroke="url(#rule)" stroke-width="1.2"/>

  <text x="40" y="40"
        font-family="'JetBrains Mono', 'IBM Plex Mono', monospace"
        font-size="10" fill="#1f4d36" letter-spacing="2" opacity="0.6">道 · DAOBREW · 2026</text>
  <text x="1160" y="40" text-anchor="end"
        font-family="'JetBrains Mono', 'IBM Plex Mono', monospace"
        font-size="10" fill="#1f4d36" letter-spacing="2" opacity="0.6">RESONANCE · 6 BPM</text>
  <text x="40" y="290"
        font-family="'JetBrains Mono', 'IBM Plex Mono', monospace"
        font-size="10" fill="#1f4d36" letter-spacing="2" opacity="0.5">DETECT → INTERVENE → MEASURE</text>
  <text x="1160" y="290" text-anchor="end"
        font-family="'JetBrains Mono', 'IBM Plex Mono', monospace"
        font-size="10" fill="#1f4d36" letter-spacing="2" opacity="0.5">MCP · iOS · SDK</text>
