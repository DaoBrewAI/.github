    <path d="M -20 160 Q 140 100 280 160 T 560 160 T 840 160 T 1120 160 T 1220 160"
          stroke="url(#wave)" stroke-width="1.4" opacity="0.5"/>
    <path d="M -20 160 Q 240 200 480 160 T 960 160 T 1220 160"
          stroke="url(#wave)" stroke-width="1" opacity="0.32"/>
  </g>

  <text x="120" y="218"
        font-family="'Songti SC', 'STSong', 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif"
        font-size="220" fill="#1f4d36" opacity="0.92" font-weight="400">道</text>

  <line x1="350" y1="115" x2="350" y2="225" stroke="#1f4d36" stroke-width="1" opacity="0.4"/>

  <text x="380" y="165"
        font-family="'Cormorant Garamond', 'EB Garamond', 'Playfair Display', Georgia, serif"
        font-size="62" fill="#0a1410" font-weight="500" letter-spacing="3.5">DaoBrew AI</text>

  <text x="382" y="210"
        font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', ui-monospace, monospace"
        font-size="15" fill="#1f4d36" letter-spacing="4.5" font-weight="400">
