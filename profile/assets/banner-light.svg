<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title">
  <title id="title">Your wearable knows you're stressed. Then what?</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5ecd6"/>
      <stop offset="100%" stop-color="#ede3c4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="460" fill="url(#bg)"/>

  <!-- Eyebrow accent line + label -->
  <line x1="80" y1="60" x2="116" y2="60" stroke="#6b6859" stroke-width="1.5" opacity="0.7"/>
  <text x="130" y="65"
        font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', ui-monospace, monospace"
        font-size="13" fill="#6b6859" letter-spacing="4.5" font-weight="500">DETECT &#183; INTERVENE &#183; MEASURE</text>

  <!-- Headline line 1 -->
  <text x="80" y="200"
        font-family="'Tiempos Headline', 'Recoleta', 'Source Serif Pro', 'Playfair Display', 'Roboto Slab', Georgia, 'Times New Roman', serif"
        font-size="94" fill="#1a1815" font-weight="700" letter-spacing="-2">Your wearable knows</text>

  <!-- Headline line 2 -->
  <text x="80" y="300"
        font-family="'Tiempos Headline', 'Recoleta', 'Source Serif Pro', 'Playfair Display', 'Roboto Slab', Georgia, 'Times New Roman', serif"
        font-size="94" fill="#1a1815" font-weight="700" letter-spacing="-2">you're stressed.</text>

  <!-- Hook: italic terracotta -->
  <text x="80" y="404"
        font-family="'Tiempos Headline', 'Recoleta', 'Source Serif Pro', 'Playfair Display', 'Roboto Slab', Georgia, 'Times New Roman', serif"
        font-size="94" fill="#c4543a" font-weight="700" font-style="italic" letter-spacing="-2">Then what?</text>
</svg>
